<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Semester — NexStudy</title>
    <meta name="description" content="Choose your semester to access subject-wise study materials, notes, and previous year papers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Auth Wall -->
    <style>body { display: none; }</style>
    <script type="module">
        import { supabase } from './supabase-config.js';
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.replace('login.html');
        } else {
            document.body.style.display = 'block';
        }
    </script>
</head>
<body class="page-transition">

    <!-- Navigation -->
    <app-navbar></app-navbar>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <div class="breadcrumb" id="breadcrumb">
                <a href="index.html">Home</a>
                <span class="separator">/</span>
                <span class="current" id="yearBreadcrumb">Loading...</span>
            </div>
            <h1 class="page-title" id="pageTitle">Loading...</h1>
            <p class="page-desc" id="pageDesc">Loading...</p>
        </div>
    </section>

    <!-- Semesters Content -->
    <section class="container">
        <div id="semesterContent" class="semester-grid">
            <!-- Dynamic content -->
        </div>
    </section>

    <!-- Footer -->
    <app-footer></app-footer>

    <script type="module" src="supabase-config.js"></script>
    <script src="js/components/Navbar.js" defer></script>
    <script src="js/components/Footer.js" defer></script>
    
    <script type="module">
        import { NEXSTUDY_DATA } from './js/modules/data.js';
        import { initApp, getParam, ordinal } from './js/modules/app.js';
        import { supabase } from './supabase-config.js';

        document.addEventListener('DOMContentLoaded', async () => {
            initApp();
            const yearNum = parseInt(getParam('year'));
            if (!yearNum) {
                window.location.href = 'index.html';
                return;
            }

            // Load custom subjects
            try {
                const { data: snap, error } = await supabase.from('custom_subjects').select('*').eq('year', yearNum);
                if (snap) {
                    snap.forEach(cs => {
                    const y = NEXSTUDY_DATA.years[cs.year];
                    if (y && y.semesters[cs.semester]) {
                        if (!y.semesters[cs.semester].subjects.find(s => s.id === cs.id)) {
                            y.semesters[cs.semester].subjects.push({ id: cs.id, name: cs.name, code: cs.code, icon: cs.icon, resources: [] });
                        }
                    }
                    });
                }
            } catch(e) { console.error('Error loading custom subjects', e); }

            if (!NEXSTUDY_DATA.years[yearNum]) {
                window.location.href = 'index.html';
                return;
            }

            const year = NEXSTUDY_DATA.years[yearNum];

            // Update page
            const yearOrdinal = ordinal(yearNum);
            document.title = `${yearOrdinal} Year — NexStudy`;
            document.getElementById('yearBreadcrumb').textContent = `${yearOrdinal} Year`;
            document.getElementById('pageTitle').innerHTML = `${yearOrdinal} Year — <span class="gradient-text">${year.name}</span>`;
            document.getElementById('pageDesc').textContent = year.description;

            // Get resource counts from Supabase for this year
            let resourceCounts = {};
            try {
                const { data: snapshot, error } = await supabase.from('resources')
                    .select('subjectId, type')
                    .eq('year', yearNum);

                if (snapshot) {
                    snapshot.forEach(data => {
                    const key = `${data.subjectId}-${data.type}`;
                    if (!resourceCounts[data.subjectId]) {
                        resourceCounts[data.subjectId] = { total: 0, notes: 0, handwritten: 0, pyq: 0, syllabus: 0 };
                    }
                    resourceCounts[data.subjectId].total++;
                    if (resourceCounts[data.subjectId][data.type] !== undefined) {
                        resourceCounts[data.subjectId][data.type]++;
                    }
                    });
                }
            } catch (err) {
                console.error('Could not load resource counts:', err);
            }

            // Render semesters
            const container = document.getElementById('semesterContent');
            let html = '';

            for (const [semNum, semester] of Object.entries(year.semesters)) {
                html += `
                    <div class="semester-card" id="sem-${semNum}">
                        <div class="semester-card-header">
                            <h3>${semester.name}</h3>
                            <span class="sem-badge">${semester.subjects.length} Subjects</span>
                        </div>
                        <div class="semester-subjects">
                `;

                semester.subjects.forEach(subject => {
                    const counts = resourceCounts[subject.id] || { total: 0, notes: 0, handwritten: 0, pyq: 0 };
                    const noteCount = counts.notes + counts.handwritten;
                    const pyqCount = counts.pyq;
                    const countText = counts.total > 0
                        ? `${subject.code} • ${noteCount} Notes • ${pyqCount} PYQs`
                        : `${subject.code}`;

                    html += `
                        <a href="subject.html?year=${yearNum}&sem=${semNum}&subject=${subject.id}" class="subject-item">
                            <div class="subject-item-left">
                                <div class="subject-icon">${subject.icon}</div>
                                <div class="subject-info">
                                    <h4>${subject.name}</h4>
                                    <p>${countText}</p>
                                </div>
                            </div>
                            <div class="subject-arrow">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                            </div>
                        </a>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;

            // Scroll to anchor if specified
            const hash = window.location.hash;
            if (hash) {
                setTimeout(() => {
                    const target = document.querySelector(hash);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 300);
            }
        });
    </script>
</body>
</html>
